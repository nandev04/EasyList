name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend: 
              - 'frontend/**'

  install-backend-deps:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd backend && pnpm install --frozen-lockfile

  lint-backend:
    needs: install-backend-deps
    runs-on: ubuntu-latest
    if: needs.install-backend-deps.result == 'success'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd backend && pnpm install --frozen-lockfile
      - run: cd backend && pnpm lint

  run-tests:
    needs: install-backend-deps
    runs-on: ubuntu-latest
    if: needs.install-backend-deps.result == 'success'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd backend && pnpm install --frozen-lockfile
      - run: cd backend && pnpm test

  install-frontend-deps:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd frontend && pnpm install --frozen-lockfile

  lint-frontend:
    needs: install-frontend-deps
    runs-on: ubuntu-latest
    if: needs.install-frontend-deps.result == 'success'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: cd frontend && pnpm lint

  typecheck-backend:
    needs: install-backend-deps
    runs-on: ubuntu-latest
    if: needs.install-backend-deps.result == 'success'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd backend && pnpm install --frozen-lockfile
      - run: cd backend && pnpm type-check

  typecheck-frontend:
    needs: install-frontend-deps
    runs-on: ubuntu-latest
    if: needs.install-frontend-deps.result == 'success'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: cd frontend && pnpm install --frozen-lockfile
      - run: cd frontend && pnpm type-check

  ci-required:
    needs:
      [
        changes,
        install-backend-deps,
        lint-backend,
        run-tests,
        typecheck-backend,
        install-frontend-deps,
        lint-frontend,
        typecheck-frontend,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verificar resultado
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          echo "CI passed"
